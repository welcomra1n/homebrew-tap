name: Auto-update tap

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update csm-gui cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo welcomra1n/csm-gui --json tagName -q .tagName)
          VERSION="${LATEST#v}"
          CURRENT=$(grep -E '^\s*version "' Casks/csm-gui.rb | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          echo "Latest: $VERSION  Current: $CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "csm-gui up to date"
          else
            ZIP_URL="https://github.com/welcomra1n/csm-gui/releases/download/${LATEST}/csm-gui-darwin.zip"
            curl -sL -o /tmp/csm-gui.zip "$ZIP_URL"
            SHA=$(sha256sum /tmp/csm-gui.zip | awk '{print $1}')

            sed -i -E "s/^( *version )\"[^\"]+\"/\\1\"${VERSION}\"/" Casks/csm-gui.rb
            sed -i -E "s/^( *sha256 )\"[^\"]+\"/\\1\"${SHA}\"/" Casks/csm-gui.rb
            echo "csm-gui updated to $VERSION"
          fi

      - name: Update csm formula (TUI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo welcomra1n/session-manager-tui --json tagName -q .tagName)
          VERSION="${LATEST#v}"
          CURRENT=$(grep -E '^\s*version "' Formula/csm.rb | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          echo "Latest: $VERSION  Current: $CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "csm up to date"
            exit 0
          fi

          BASE="https://github.com/welcomra1n/session-manager-tui/releases/download/${LATEST}"
          for arch in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            curl -sL -o "/tmp/csm-${arch}" "${BASE}/csm-${arch}"
            sha=$(sha256sum "/tmp/csm-${arch}" | awk '{print $1}')
            eval "SHA_${arch//-/_}=$sha"
          done

          sed -i -E "s/^( *version )\"[^\"]+\"/\\1\"${VERSION}\"/" Formula/csm.rb

          export VERSION SHA_darwin_arm64 SHA_darwin_amd64 SHA_linux_arm64 SHA_linux_amd64

          # Replace each sha256 by matching the URL line right above it
          python3 - <<PY
          import re, os
          path = "Formula/csm.rb"
          with open(path) as f:
              text = f.read()
          shas = {
              "darwin-arm64": os.environ.get("SHA_darwin_arm64",""),
              "darwin-amd64": os.environ.get("SHA_darwin_amd64",""),
              "linux-arm64":  os.environ.get("SHA_linux_arm64",""),
              "linux-amd64":  os.environ.get("SHA_linux_amd64",""),
          }
          def repl(m):
              arch = m.group(1)
              sha = shas.get(arch, "")
              return f'csm-{arch}"\n      sha256 "{sha}"'
          text = re.sub(r'csm-(darwin-arm64|darwin-amd64|linux-arm64|linux-amd64)"\s*\n\s*sha256 "[a-f0-9]+"', repl, text)
          # version URL number
          text = re.sub(r'/v[0-9.]+/csm-', f'/v{os.environ["VERSION"]}/csm-', text)
          with open(path, "w") as f:
              f.write(text)
          PY
          echo "csm updated to $VERSION"

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ Formula/
          git commit -m "auto-update casks/formulae"
          git push
